moveit_simple_controller_manager:
  ros__parameters:
    controller_names:
      - arm_controller
      - gripper_controller

    arm_controller:
      action_ns: follow_joint_trajectory
      type: FollowJointTrajectory
      default: true
      joints:
        - shoulder_pan_joint
        - shoulder_lift_joint
        - elbow_joint

    gripper_controller:
      action_ns: gripper_command
      type: GripperCommand
      default: true
      joints:
        - left_finger_joint
