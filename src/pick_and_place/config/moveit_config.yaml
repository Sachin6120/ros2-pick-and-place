# MoveIt 2 configuration for pick_and_place 3-DOF arm
# ----------------------------------------------------------

# SRDF-equivalent inline configuration
# (For larger projects, generate .srdf with MoveIt Setup Assistant)

move_group:
  ros__parameters:
    # Planning groups
    robot_description_semantic:
      type: string
      value: |
        <?xml version="1.0" ?>
        <robot name="pick_place_arm">
          <!-- Arm planning group -->
          <group name="arm">
            <joint name="shoulder_pan_joint"/>
            <joint name="shoulder_lift_joint"/>
            <joint name="elbow_joint"/>
          </group>

          <!-- Gripper planning group -->
          <group name="gripper">
            <joint name="left_finger_joint"/>
          </group>

          <!-- End-effector definition -->
          <end_effector name="gripper" parent_link="ee_link"
                        group="gripper" parent_group="arm"/>

          <!-- Named states -->
          <group_state name="home" group="arm">
            <joint name="shoulder_pan_joint" value="0"/>
            <joint name="shoulder_lift_joint" value="0"/>
            <joint name="elbow_joint" value="0"/>
          </group_state>

          <group_state name="open" group="gripper">
            <joint name="left_finger_joint" value="0.04"/>
          </group_state>

          <group_state name="closed" group="gripper">
            <joint name="left_finger_joint" value="0.0"/>
          </group_state>

          <!-- Disable collision between adjacent and nearby links -->
          <disable_collisions link1="base_link" link2="link1" reason="Adjacent"/>
          <disable_collisions link1="link1" link2="link2" reason="Adjacent"/>
          <disable_collisions link1="link2" link2="link3" reason="Adjacent"/>
          <disable_collisions link1="link3" link2="ee_link" reason="Adjacent"/>
          <disable_collisions link1="ee_link" link2="gripper_palm" reason="Adjacent"/>
          <disable_collisions link1="gripper_palm" link2="left_finger" reason="Adjacent"/>
          <disable_collisions link1="gripper_palm" link2="right_finger" reason="Adjacent"/>
          <disable_collisions link1="left_finger" link2="right_finger" reason="Adjacent"/>
          <disable_collisions link1="link3" link2="gripper_palm" reason="Never"/>
          <disable_collisions link1="link3" link2="left_finger" reason="Never"/>
          <disable_collisions link1="link3" link2="right_finger" reason="Never"/>
          <disable_collisions link1="ee_link" link2="left_finger" reason="Never"/>
          <disable_collisions link1="ee_link" link2="right_finger" reason="Never"/>
          <disable_collisions link1="link2" link2="ee_link" reason="Never"/>
          <disable_collisions link1="link2" link2="gripper_palm" reason="Never"/>
          <disable_collisions link1="link2" link2="left_finger" reason="Never"/>
          <disable_collisions link1="link2" link2="right_finger" reason="Never"/>
          <disable_collisions link1="base_link" link2="link2" reason="Never"/>
        </robot>

    # Planning pipeline
    planning_plugin: ompl_interface/OMPLPlanner
    request_adapters: >-
      default_planner_request_adapters/AddTimeOptimalParameterization
      default_planner_request_adapters/ResolveConstraintFrames
      default_planner_request_adapters/FixWorkspaceBounds
      default_planner_request_adapters/FixStartStateBounds
      default_planner_request_adapters/FixStartStateCollision
      default_planner_request_adapters/FixStartStatePathConstraints

    # OMPL planner configs
    planner_configs:
      RRTConnect:
        type: geometric::RRTConnect
        range: 0.0
      RRTstar:
        type: geometric::RRTstar
        range: 0.0
      PRM:
        type: geometric::PRM

    # Default planner per group
    arm:
      default_planner_config: RRTConnect
      planner_configs:
        - RRTConnect
        - RRTstar
      projection_evaluator: joints(shoulder_pan_joint,shoulder_lift_joint)
      longest_valid_segment_fraction: 0.005

    # Planning parameters
    planning_scene_monitor_options:
      name: planning_scene_monitor
      robot_description: robot_description
      joint_state_topic: /joint_states
      attached_collision_object_topic: /attached_collision_object
      publish_planning_scene_topic: /publish_planning_scene
      monitored_planning_scene_topic: /monitored_planning_scene
      wait_for_initial_state_timeout: 10.0

    # Trajectory execution
    moveit_manage_controllers: true
    trajectory_execution:
      allowed_execution_duration_scaling: 4.0
      allowed_goal_duration_margin: 5.0
      allowed_start_tolerance: 0.0
      execution_duration_monitoring: true

    # Planning time budget
    default_planning_time: 5.0
    default_num_planning_attempts: 10
